<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Timebase</title>
<meta name="description" content="A world clock you actually want to open. Drag anywhere to see what time it'll be." />
<meta name="theme-color" content="#F8F6F2" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0E0E10" media="(prefers-color-scheme: dark)" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,400..900,0..100,0..1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles.css" />
</head>
<body>

<main id="clock" aria-label="World clock"></main>

<div id="dock">
  <button id="add-pill" class="pill icon-pill" type="button" aria-label="Add city">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>
  <button id="about-pill" class="pill icon-pill" type="button" aria-label="About Timebase">
    <span class="info-glyph">i</span>
  </button>
  <div id="scrub-pill" class="pill" hidden></div>
  <div id="next-pill" class="pill" hidden></div>
</div>

<!-- Add city sheet -->
<dialog id="add-sheet" aria-label="Add city">
  <form method="dialog" class="sheet-inner">
    <header>
      <input id="city-search" type="search" placeholder="Search 1,500+ cities" autocomplete="off" autocorrect="off" />
      <button type="submit" value="cancel" aria-label="Close">Done</button>
    </header>
    <h2 id="city-section-label">Suggested</h2>
    <ul id="city-results"></ul>
  </form>
</dialog>

<!-- City detail sheet -->
<dialog id="detail-sheet" aria-label="City details">
  <form method="dialog" class="sheet-inner detail">
    <header>
      <span></span>
      <button type="submit" value="cancel">Done</button>
    </header>
    <div id="detail-body"></div>
    <footer>
      <button type="button" id="make-home-btn">Make home</button>
      <button type="button" id="remove-btn" class="danger">Remove from list</button>
    </footer>
  </form>
</dialog>


<!-- About card — Macintosh-style -->
<dialog id="about-sheet" aria-label="About Timebase">
  <form method="dialog" class="about-card">
    <div class="traffic-lights">
      <button type="submit" value="cancel" class="traffic-light close" aria-label="Close">
        <svg viewBox="0 0 8 8" aria-hidden="true"><path d="M1.5 1.5l5 5M6.5 1.5l-5 5"/></svg>
      </button>
      <span class="traffic-light minimize" aria-hidden="true">
        <svg viewBox="0 0 8 8"><path d="M1.5 4h5"/></svg>
      </span>
      <span class="traffic-light maximize" aria-hidden="true">
        <svg viewBox="0 0 8 8"><path d="M2 2h4v4h-4z" fill="none"/></svg>
      </span>
    </div>
    <div class="about-wordmark">Timebase</div>
    <div class="about-version">v1.0 · 2026</div>
    <p class="about-tagline">A quieter way to think across timezones.</p>
    <p class="about-subline">A minimal world clock. Drag, scroll, or scrub to see what time it'll be anywhere.</p>

    <div class="about-settings">
      <label>
        <span>24-hour time</span>
        <select id="about-setting-24h">
          <option value="system">System</option>
          <option value="on">On</option>
          <option value="off">Off</option>
        </select>
      </label>
      <label>
        <span>Theme</span>
        <select id="about-setting-appearance">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </label>
    </div>

    <div class="about-divider"></div>

    <div class="about-foot">
      <span class="about-credit">
        Crafted by
        <a href="https://x.com/amrith" target="_blank" rel="noopener me">@amrith</a>
      </span>
      <div class="about-links">
        <a href="https://github.com/timebaseapp" target="_blank" rel="noopener" aria-label="GitHub">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56v-2.02c-3.2.7-3.87-1.36-3.87-1.36-.52-1.33-1.27-1.69-1.27-1.69-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.19 1.76 1.19 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.18-3.1-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.15 1.18a10.94 10.94 0 0 1 5.74 0c2.19-1.49 3.15-1.18 3.15-1.18.62 1.58.23 2.75.11 3.04.74.81 1.18 1.84 1.18 3.1 0 4.42-2.69 5.4-5.25 5.69.41.36.78 1.06.78 2.14v3.17c0 .31.21.68.8.56 4.56-1.52 7.85-5.83 7.85-10.91C23.5 5.65 18.35.5 12 .5Z"/></svg>
        </a>
        <a href="https://x.com/amrith" target="_blank" rel="noopener" aria-label="X (Twitter)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.66l-5.214-6.817-5.965 6.817H1.68l7.73-8.835L1.254 2.25h6.83l4.713 6.231 5.447-6.231Zm-1.161 17.52h1.832L7.084 4.126H5.117L17.083 19.77Z"/></svg>
        </a>
      </div>
    </div>

  </form>
</dialog>

<!-- First-run hint -->
<div id="hint" hidden>
  <p>Drag anywhere to see what time it'll be.</p>
  <p>Double-tap to return to now.</p>
  <button type="button" id="hint-dismiss">Got it</button>
</div>

<script src="/app.js" type="module"></script>
</body>
</html>
